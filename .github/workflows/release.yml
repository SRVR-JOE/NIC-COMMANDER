name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release ZIP
        run: |
          mkdir release
          cp NIC-CommandCenter.ps1 NIC-CommandCenter.bat README.md CHANGELOG.md LICENSE release/
          cd release && zip -r ../NIC-CommandCenter-${{ github.ref_name }}.zip .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NIC-CommandCenter-*.zip
          generate_release_notes: true
